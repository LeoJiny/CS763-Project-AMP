name: cs763-amp
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # ── Deep learning ──────────────────────────────────────────────────────────
  - pytorch::pytorch=2.2          # CPU-only build is sufficient
  - pytorch::cpuonly
  # ── HuggingFace ecosystem ──────────────────────────────────────────────────
  - conda-forge::transformers=4.40
  - conda-forge::datasets=2.19
  - conda-forge::tokenizers>=0.15
  # ── Scientific Python ──────────────────────────────────────────────────────
  - conda-forge::numpy=1.26
  - conda-forge::scipy=1.13
  - conda-forge::pandas=2.2
  - conda-forge::scikit-learn=1.4
  - conda-forge::joblib>=1.3
  - conda-forge::matplotlib=3.8
  - conda-forge::seaborn=0.13
  # ── Bioinformatics ─────────────────────────────────────────────────────────
  - conda-forge::biopython=1.83   # BioPython >= 1.79 required for matrix tuple indexing
  - conda-forge::requests>=2.31
  # ── Notebook infrastructure ────────────────────────────────────────────────
  - conda-forge::jupyterlab>=4.0
  - conda-forge::ipykernel>=6.0
  - conda-forge::nbformat>=5.9
  - pip:
    # modlamp is not on conda-forge; install via pip
    - modlamp==4.3.0
